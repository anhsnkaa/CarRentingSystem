<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Car Renting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/auth/login.css}">
</head>
<body class="auth-body">
<div class="auth-card">
    <div class="text-center mb-4">
        <h3 class="mb-1">Car Renting</h3>
        <p class="text-muted small mb-0">Sign in to continue</p>
    </div>
    <form th:action="@{/login}" method="post">
        <div>
            <label class="form-label small fw-bold">Email</label>
            <div>
                <input type="email" name="email" placeholder="abc@gmail.com " class="form-control" required>
            </div>
        </div>

        <div>
            <label class="form-label small fw-bold">Password</label>
            <div>
                <input type="password" name="password" placeholder="******" class="form-control" required minlength="6">
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-3">Sign in</button>
        <div th:if="${param.error}" class="alert alert-danger small mt-3 mb-0">
            Invalid email or password.
        </div>

        <div th:if="${param.logout}" class="alert alert-success small mt-3 mb-0">
            You have been logged out.
        </div>

        <div th:if="${param.registered}" class="alert alert-success small mt-3 mb-0">
            Registration successful. Please sign in.
        </div>

    </form>
    <p>Don't have an account?
        <a th:href="@{/register}">Register here</a>
    </p>
</div>
</body>
</html>
