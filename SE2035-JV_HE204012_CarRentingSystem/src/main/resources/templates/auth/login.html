<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign in — FU Car Renting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/auth/login.css}">
</head>
<body class="auth-body">

<div class="auth-card">
    <h3>Sign in</h3>
    <p class="sub">FU Car Renting</p>

    <form th:action="@{/login}" method="post">
        <div class="field">
            <label for="accountName">Username</label>
            <input type="text" id="accountName" name="accountName" placeholder="" autocomplete="username" required>
        </div>

        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>

        <button type="submit" class="btn-submit">Sign in</button>

        <div th:if="${param.error}" class="msg msg-error">
            Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="msg msg-ok">
            You have been logged out.
        </div>
        <div th:if="${param.registered}" class="msg msg-ok">
            Registration successful. Please sign in.
        </div>
    </form>

    <p class="footer-row">
        Don't have an account?
        <a th:href="@{/register}">Register</a>
    </p>
    <a th:href="@{/}" class="back-link">← Back to home</a>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
