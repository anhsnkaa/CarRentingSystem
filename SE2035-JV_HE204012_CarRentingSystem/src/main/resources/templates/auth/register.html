<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Car Renting</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/auth/login.css}">
</head>
<body class="auth-body">

<div class="auth-card" style="max-width: 520px;">
    <div class="text-center mb-4">
        <h3 class="mb-1">Car Renting</h3>
        <p class="text-muted small mb-0">Create your account</p>
    </div>

    <div th:if="${error}" class="alert alert-danger small" th:text="${error}"></div>

    <form th:action="@{/register}" th:object="${registerRequest}" method="post">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="mb-2">
            <label class="form-label small fw-bold">Email</label>
            <input type="email" th:field="*{email}" class="form-control" placeholder="you@example.com">
            <small class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
        </div>

        <div class="mb-2">
            <label class="form-label small fw-bold">Password</label>
            <input type="password" th:field="*{password}" class="form-control" placeholder="At least 6 characters">
            <small class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
        </div>

        <div class="mb-2">
            <label class="form-label small fw-bold">Full name</label>
            <input type="text" th:field="*{fullName}" class="form-control" placeholder="John Doe">
            <small class="text-danger" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></small>
        </div>

        <div class="mb-2">
            <label class="form-label small fw-bold">Mobile</label>
            <input type="text" th:field="*{mobile}" class="form-control" placeholder="0901234567">
            <small class="text-danger" th:if="${#fields.hasErrors('mobile')}" th:errors="*{mobile}"></small>
        </div>

        <div class="mb-2">
            <label class="form-label small fw-bold">Birthday</label>
            <input type="date" th:field="*{birthday}" class="form-control">
            <small class="text-danger" th:if="${#fields.hasErrors('birthday')}" th:errors="*{birthday}"></small>
        </div>

        <div class="mb-2">
            <label class="form-label small fw-bold">Identity Card</label>
            <input type="text" th:field="*{identityCard}" class="form-control" placeholder="079090123456">
            <small class="text-danger" th:if="${#fields.hasErrors('identityCard')}" th:errors="*{identityCard}"></small>
        </div>

        <div class="mb-2">
            <label class="form-label small fw-bold">Licence Number</label>
            <input type="text" th:field="*{licenceNumber}" class="form-control" placeholder="B12345678">
            <small class="text-danger" th:if="${#fields.hasErrors('licenceNumber')}" th:errors="*{licenceNumber}"></small>
        </div>

        <div class="mb-3">
            <label class="form-label small fw-bold">Licence Date</label>
            <input type="date" th:field="*{licenceDate}" class="form-control">
            <small class="text-danger" th:if="${#fields.hasErrors('licenceDate')}" th:errors="*{licenceDate}"></small>
        </div>

        <button type="submit" class="btn btn-primary w-100">Register</button>
</form>

<p class="text-center mt-3 small">
    Already have an account?
    <a th:href="@{/login}">Sign in</a>
</p>

</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
