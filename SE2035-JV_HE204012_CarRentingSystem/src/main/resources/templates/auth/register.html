<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register — FU Car Renting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/auth/login.css}">
</head>
<body class="auth-body">

<div class="auth-card" style="max-width: 480px;">
    <h3>Create account</h3>
    <p class="sub">FU Car Renting</p>

    <div th:if="${error}" class="msg msg-error" th:text="${error}"></div>

    <form th:action="@{/register}" th:object="${registerRequest}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="field">
            <label>Account name</label>
            <input type="text" th:field="*{accountName}" placeholder="e.g. john.doe" required>

            <span class="err" th:if="${#fields.hasErrors('accountName')}" th:errors="*{accountName}"></span>
        </div>

        <div class="field">
            <label>Password</label>
            <input type="password" th:field="*{password}" placeholder="Your password" required>
            <span class="err" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
        </div>

        <div class="field">
            <label>Email</label>
            <input type="email" th:field="*{email}" placeholder="you@example.com" required>
            <span class="err" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
        </div>

        <div class="field">
            <label>Full name</label>
            <input type="text" th:field="*{fullName}" placeholder="John Doe" required>
            <span class="err" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></span>
        </div>

        <div class="field-row cols-2">
            <div class="field">
                <label>Mobile</label>
                <input type="text" th:field="*{mobile}" placeholder="0901234567" required>
                <span class="err" th:if="${#fields.hasErrors('mobile')}" th:errors="*{mobile}"></span>
            </div>
            <div class="field">
                <label>Birthday</label>
                <input type="date" th:field="*{birthday}" required>
                <span class="err" th:if="${#fields.hasErrors('birthday')}" th:errors="*{birthday}"></span>
            </div>
        </div>

        <div class="field-row cols-2">
            <div class="field">
                <label>Identity Card</label>
                <input type="text" th:field="*{identityCard}" placeholder="079090123456" required>
                <span class="err" th:if="${#fields.hasErrors('identityCard')}" th:errors="*{identityCard}"></span>
            </div>
            <div class="field">
                <label>Licence Number</label>
                <input type="text" th:field="*{licenceNumber}" placeholder="B12345678" required>
                <span class="err" th:if="${#fields.hasErrors('licenceNumber')}" th:errors="*{licenceNumber}"></span>
            </div>
        </div>

        <div class="field">
            <label>Licence Date</label>
            <input type="date" th:field="*{licenceDate}" required>
            <span class="err" th:if="${#fields.hasErrors('licenceDate')}" th:errors="*{licenceDate}"></span>
        </div>

        <button type="submit" class="btn-submit">Register</button>
    </form>

    <p class="footer-row">
        Already have an account?
        <a th:href="@{/login}">Sign in</a>
    </p>
    <a th:href="@{/}" class="back-link">← Back to home</a>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
