<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/customer/customer.css}">
</head>
<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <div class="admin-layout">
        <div th:replace="~{fragments/sidebar :: sidebar(activeMenu='profile')}"></div>

        <main class="admin-content">
            <h1 class="mb-4">My Profile</h1>

            <div class="card border" style="max-width: 600px;">
                <div class="card-body">
                    <table class="table table-borderless mb-0">
                        <tr>
                            <th class="text-muted small" style="width: 35%;">Account name</th>
                            <td>
                                <a th:href="@{/customer/profile/edit}" class="text-decoration-none" th:text="${account.account.accountName}">admin</a>
                            </td>
                        </tr>
                        <tr>
                            <th class="text-muted small">Email</th>
                            <td th:text="${account.account.email}">admin@gmail.com</td>
                        </tr>
                        <tr>
                            <th class="text-muted small">Role</th>
                            <td><span class="badge bg-primary" th:text="${account.account.role}">ADMIN</span></td>
                        </tr>
                        <tr>
                            <th class="text-muted small">Status</th>
                            <td>
                                <span th:if="${account.account.isActive}" class="badge bg-success">Active</span>
                                <span th:unless="${account.account.isActive}" class="badge bg-secondary">Inactive</span>
                            </td>
                        </tr>
                    </table>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
