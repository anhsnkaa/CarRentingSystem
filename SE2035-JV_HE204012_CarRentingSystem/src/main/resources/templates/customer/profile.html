<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="admin-layout">
    <main class="admin-content" style="max-width: 800px; margin: 0 auto;">
        <h1 class="mb-4">My Profile</h1>

        <div th:if="${toastMessage}" class="alert alert-dismissible fade show"
             th:classappend="${toastType == 'success' ? 'alert-success' : 'alert-danger'}">
            <span th:text="${toastMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="mb-3 d-flex gap-2">
            <a th:href="@{/customer/dashboard}" class="btn btn-outline-secondary btn-sm">← Dashboard</a>
            <a th:href="@{/customer/bookings}" class="btn btn-outline-primary btn-sm">My Bookings →</a>
        </div>

        <form th:action="@{/customer/profile}" th:object="${customerRequest}" method="post" class="card border p-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="mb-3">
                <label class="form-label">Email (username)</label>
                <input type="text" class="form-control" th:value="${account.account.email}" disabled>
            </div>

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" th:field="*{fullName}" class="form-control"
                       th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{fullName}"></div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Mobile</label>
                    <input type="text" th:field="*{mobile}" class="form-control"
                           th:classappend="${#fields.hasErrors('mobile')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{mobile}"></div>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Birthday</label>
                    <input type="date" th:field="*{birthday}" class="form-control"
                           th:classappend="${#fields.hasErrors('birthday')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{birthday}"></div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Identity Card</label>
                    <input type="text" th:field="*{identityCard}" class="form-control"
                           th:classappend="${#fields.hasErrors('identityCard')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{identityCard}"></div>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Licence Number</label>
                    <input type="text" th:field="*{licenceNumber}" class="form-control"
                           th:classappend="${#fields.hasErrors('licenceNumber')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{licenceNumber}"></div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Licence Date</label>
                <input type="date" th:field="*{licenceDate}" class="form-control"
                       th:classappend="${#fields.hasErrors('licenceDate')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{licenceDate}"></div>
            </div>

            <div class="d-flex justify-content-end mt-4">
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
        </form>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
