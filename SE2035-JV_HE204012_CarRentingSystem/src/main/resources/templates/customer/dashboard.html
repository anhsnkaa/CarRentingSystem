<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="app-layout">
    <main class="app-content">
        <div class="page-head">
            <div>
                <h1>Welcome, <span th:text="${account.account.accountName}">Customer</span></h1>
                <p class="sub">Manage your rentals and profile.</p>
            </div>
        </div>

        <div th:if="${toastMessage}" th:class="${toastType == 'success' ? 'toast toast-ok' : 'toast toast-err'}"
             th:text="${toastMessage}"></div>

        <div class="stat-grid">
            <a th:href="@{/customer/profile}" class="stat-card" style="text-decoration:none; color:inherit;">
                <div class="label">Profile</div>
                <div class="num" style="font-size:18px;">Update info</div>
                <span class="link">Open →</span>
            </a>
            <a th:href="@{/customer/bookings/new}" class="stat-card" style="text-decoration:none; color:inherit;">
                <div class="label">New booking</div>
                <div class="num" style="font-size:18px;">Browse cars</div>
                <span class="link">Open →</span>
            </a>
            <a th:href="@{/customer/bookings}" class="stat-card" style="text-decoration:none; color:inherit;">
                <div class="label">My bookings</div>
                <div class="num" style="font-size:18px;">View history</div>
                <span class="link">Open →</span>
            </a>

        </div>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
