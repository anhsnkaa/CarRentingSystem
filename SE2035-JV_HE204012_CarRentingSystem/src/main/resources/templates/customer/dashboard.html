<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-5">
    <h1 class="mb-4">Welcome, <span th:text="${account.account.accountName}">Customer</span>!</h1>

    <div th:if="${toastMessage}" class="alert alert-dismissible fade show"
         th:classappend="${toastType == 'success' ? 'alert-success' : 'alert-danger'}">
        <span th:text="${toastMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row mt-4">
        <div class="col-md-4 mb-3">
            <div class="card border h-100">
                <div class="card-body">
                    <h5>My Profile</h5>
                    <p class="text-muted small">Update personal info, mobile, licence.</p>
                    <a th:href="@{/customer/profile}" class="btn btn-outline-primary btn-sm">Go →</a>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card border h-100">
                <div class="card-body">
                    <h5>New Booking</h5>
                    <p class="text-muted small">Browse cars and create a rental.</p>
                    <a th:href="@{/customer/bookings/new}" class="btn btn-outline-primary btn-sm">Go →</a>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card border h-100">
                <div class="card-body">
                    <h5>My Bookings</h5>
                    <p class="text-muted small">View history, cancel, leave reviews.</p>
                    <a th:href="@{/customer/bookings}" class="btn btn-outline-primary btn-sm">Go →</a>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
