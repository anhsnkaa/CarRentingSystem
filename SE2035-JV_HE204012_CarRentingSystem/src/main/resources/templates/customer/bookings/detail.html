<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Booking Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="app-layout">
    <main class="app-content">
        <div class="page-head">
            <h1>Booking #<span th:text="${rental.id}">0</span></h1>
            <div class="actions">
                <a th:href="@{/customer/bookings}" class="btn btn-ghost btn-sm">← Back</a>
            </div>
        </div>

        <div th:if="${toastMessage}" th:class="${toastType == 'success' ? 'toast toast-ok' : 'toast toast-err'}"
             th:text="${toastMessage}"></div>

        <div class="detail-card">
            <div class="detail-row">
                <dt>Car</dt>
                <dd th:text="${car != null ? car.carName : 'Car ' + rental.carId}"></dd>
            </div>
            <div class="detail-row">
                <dt>Color</dt>
                <dd th:text="${car != null ? car.color : '-'}"></dd>
            </div>
            <div class="detail-row">
                <dt>Pickup Date</dt>
                <dd th:text="${rental.pickupDate}"></dd>
            </div>
            <div class="detail-row">
                <dt>Return Date</dt>
                <dd th:text="${rental.returnDate}"></dd>
            </div>
            <div class="detail-row">
                <dt>Total Price</dt>
                <dd th:text="${#numbers.formatDecimal(rental.rentPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></dd>
            </div>
            <div class="detail-row">
                <dt>Status</dt>
                <dd>
                    <span th:class="${rental.status == 'Active' ? 'pill pill-active' : (rental.status == 'Completed' ? 'pill pill-ok' : 'pill pill-muted')}"
                          th:text="${rental.status}"></span>
                </dd>
            </div>
        </div>

        <div class="form-card" th:if="${rental.status == 'Active' or rental.status == 'Completed'}">
            <h2 style="font-size:16px; margin-bottom:16px;">Leave a review</h2>
            <form th:action="@{/customer/bookings/{id}/review(id=${rental.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="field-row cols-2">
                    <div class="field">
                        <label>Rating</label>
                        <select name="stars" required>
                            <option value="">--</option>
                            <option value="5">★★★★★ (5)</option>
                            <option value="4">★★★★☆ (4)</option>
                            <option value="3">★★★☆☆ (3)</option>
                            <option value="2">★★☆☆☆ (2)</option>
                            <option value="1">★☆☆☆☆ (1)</option>
                        </select>
                    </div>
                </div>
                <div class="field">
                    <label>Comment</label>
                    <textarea name="comment" rows="3" maxlength="500" required></textarea>
                </div>
                <div class="form-actions">
                    <span></span>
                    <button type="submit" class="btn">Submit Review</button>
                </div>
            </form>
        </div>

        <div class="form-card" th:if="${!#lists.isEmpty(reviews)}" style="margin-top:16px;">
            <h2 style="font-size:16px; margin-bottom:16px;">Your reviews</h2>
            <div th:each="rv : ${reviews}" style="padding:12px 0; border-top:1px solid var(--line-2);">
                <div class="stars" th:text="${#strings.repeat('★', rv.reviewStar) + #strings.repeat('☆', 5 - rv.reviewStar)}">★★★★★</div>
                <p style="margin:6px 0 0; color:var(--ink-2); font-size:14px;" th:text="${rv.comment}">Comment</p>
            </div>
        </div>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
