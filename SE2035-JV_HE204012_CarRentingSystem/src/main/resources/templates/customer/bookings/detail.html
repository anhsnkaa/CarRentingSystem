<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Booking Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="admin-layout">
    <main class="admin-content">
        <h1 class="mb-4">Booking #<span th:text="${rental.id}"></span></h1>

        <div th:if="${toastMessage}" class="alert alert-dismissible fade show"
             th:classappend="${toastType == 'success' ? 'alert-success' : 'alert-danger'}">
            <span th:text="${toastMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card border p-4 mb-4">
            <dl class="row mb-0">
                <dt class="col-sm-3">Car</dt>
                <dd class="col-sm-9" th:text="${car != null ? car.carName : 'Car ' + rental.carId}"></dd>

                <dt class="col-sm-3">Color</dt>
                <dd class="col-sm-9" th:text="${car != null ? car.color : '-'}"></dd>

                <dt class="col-sm-3">Pickup Date</dt>
                <dd class="col-sm-9" th:text="${rental.pickupDate}"></dd>

                <dt class="col-sm-3">Return Date</dt>
                <dd class="col-sm-9" th:text="${rental.returnDate}"></dd>

                <dt class="col-sm-3">Total Price</dt>
                <dd class="col-sm-9" th:text="${#numbers.formatDecimal(rental.rentPrice, 0, 'COMMA', 2, 'POINT')} + ' đ'"></dd>

                <dt class="col-sm-3">Status</dt>
                <dd class="col-sm-9" th:text="${rental.status}"></dd>
            </dl>
        </div>

        <div class="mb-4">
            <a th:href="@{/customer/bookings}" class="btn btn-outline-secondary">← Back</a>
        </div>

        <div class="card border p-4 mb-4" th:if="${rental.status == 'Active' or rental.status == 'Completed'}">
            <h5>Leave a Review</h5>
            <form th:action="@{/customer/bookings/{id}/review(id=${rental.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="mb-3">
                    <label class="form-label">Rating (1-5)</label>
                    <select name="stars" class="form-select" required>
                        <option value="">--</option>
                        <option value="5">★★★★★ (5)</option>
                        <option value="4">★★★★ (4)</option>
                        <option value="3">★★★ (3)</option>
                        <option value="2">★★ (2)</option>
                        <option value="1">★ (1)</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Comment</label>
                    <textarea name="comment" class="form-control" rows="3" maxlength="500" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Submit Review</button>
            </form>
        </div>

        <div class="card border p-4" th:if="${!#lists.isEmpty(reviews)}">
            <h5>Your Reviews</h5>
            <div th:each="rv : ${reviews}" class="mb-3 pb-3 border-bottom">
                <div class="text-warning fs-5">
                    <th:block th:each="i : ${#numbers.sequence(1, 5)}">
                        <span th:text="${i <= rv.reviewStar ? '★' : '☆'}"></span>
                    </th:block>
                </div>
                <p class="mb-0 mt-1" th:text="${rv.comment}"></p>
            </div>
        </div>

        <div class="mt-4">
            <a th:href="@{/customer/dashboard}" class="btn btn-outline-secondary">← Back to Dashboard</a>
        </div>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
