<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Bookings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="admin-layout">
    <main class="admin-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="mb-0">My Bookings</h1>
            <div>
                <a th:href="@{/customer/dashboard}" class="btn btn-outline-secondary">← Dashboard</a>
                <a th:href="@{/customer/bookings/new}" class="btn btn-primary">+ New Booking</a>
            </div>
        </div>

        <div th:if="${toastMessage}" class="alert alert-dismissible fade show"
             th:classappend="${toastType == 'success' ? 'alert-success' : 'alert-danger'}">
            <span th:text="${toastMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card border">
            <table class="table table-borderless mb-0">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Pickup</th>
                    <th>Return</th>
                    <th>Total Price</th>
                    <th>Status</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${rentals.totalElements == 0}">
                    <td colspan="6" class="text-center text-muted py-4">No bookings yet</td>
                </tr>
                <tr th:each="r : ${rentals}">
                    <td><a th:href="@{/customer/bookings/{id}(id=${r.id})}" th:text="${r.id}"></a></td>
                    <td th:text="${r.pickupDate}"></td>
                    <td th:text="${r.returnDate}"></td>
                    <td th:text="${#numbers.formatDecimal(r.rentPrice, 0, 'COMMA', 2, 'POINT')} + ' đ'"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${r.status == 'Active' ? 'bg-primary' : (r.status == 'Completed' ? 'bg-success' : 'bg-secondary')}"
                              th:text="${r.status}"></span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/customer/bookings/{id}(id=${r.id})}" class="btn btn-sm btn-outline-primary">View</a>
                        <form th:if="${r.status == 'Active'}"
                              th:action="@{/customer/bookings/{id}/cancel(id=${r.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Cancel this booking?');">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-outline-danger">Cancel</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-3" th:if="${totalPages > 1}">
            <small class="text-muted">
                Page <span th:text="${currentPage}">1</span> of <span th:text="${totalPages}">1</span>
                | Total: <span th:text="${rentals.totalElements}">0</span> booking(s)
            </small>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${currentPage == 1 ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/customer/bookings(page=${currentPage - 1})}">Previous</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                        th:classappend="${currentPage == i ? 'active' : ''}">
                        <a class="page-link" th:href="@{/customer/bookings(page=${i})}" th:text="${i}"></a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage == totalPages ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/customer/bookings(page=${currentPage + 1})}">Next</a>
                    </li>
                </ul>
            </nav>
        </div>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
