<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Bookings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="app-layout">
    <main class="app-content">
        <div class="page-head">
            <h1>My Bookings</h1>
            <div class="actions">
                <a th:href="@{/customer/dashboard}" class="btn btn-ghost btn-sm">Dashboard</a>
                <a th:href="@{/customer/bookings/new}" class="btn">+ New Booking</a>
            </div>
        </div>

        <div th:if="${toastMessage}" th:class="${toastType == 'success' ? 'toast toast-ok' : 'toast toast-err'}"
             th:text="${toastMessage}"></div>

        <div class="table-wrap" th:if="${rentals.totalElements > 0}">
            <table class="dtable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Pickup</th>
                        <th>Return</th>
                        <th>Total Price</th>
                        <th>Status</th>
                        <th class="actions">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${rentals}">
                        <td class="num"><a th:href="@{/customer/bookings/{id}(id=${r.id})}" th:text="${r.id}"></a></td>
                        <td th:text="${r.pickupDate}"></td>
                        <td th:text="${r.returnDate}"></td>
                        <td class="num" th:text="${#numbers.formatDecimal(r.rentPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                        <td>
                            <span th:class="${r.status == 'Active' ? 'pill pill-active' : (r.status == 'Completed' ? 'pill pill-ok' : 'pill pill-muted')}"
                                  th:text="${r.status}"></span>
                        </td>
                        <td class="actions">
                            <a th:href="@{/customer/bookings/{id}(id=${r.id})}" class="btn btn-sm btn-ghost">View</a>
                            <form th:if="${r.status == 'Active'}"
                                  th:action="@{/customer/bookings/{id}/cancel(id=${r.id})}" method="post"
                                  onsubmit="return confirm('Cancel this booking?');">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-danger">Cancel</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="card-empty" th:if="${rentals.totalElements == 0}">No bookings yet.</div>

        <div class="pager" th:if="${totalPages > 0}">
            <span class="info">
                Page <span th:text="${currentPage}">1</span> / <span th:text="${totalPages}">1</span>
                · Total: <span th:text="${rentals.totalElements}">0</span>
            </span>
            <div class="pages">
                <a th:class="${currentPage == 1 ? 'disabled' : ''}"
                   th:href="@{/customer/bookings(page=${currentPage - 1})}">Prev</a>
                <span th:each="i : ${#numbers.sequence(1, totalPages)}"
                      th:class="${currentPage == i ? 'current' : ''}">
                    <a th:if="${currentPage != i}"
                       th:href="@{/customer/bookings(page=${i})}" th:text="${i}"></a>
                    <span th:if="${currentPage == i}" th:text="${i}"></span>
                </span>
                <a th:class="${currentPage == totalPages ? 'disabled' : ''}"
                   th:href="@{/customer/bookings(page=${currentPage + 1})}">Next</a>
            </div>
        </div>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
