<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="admin-layout">
    <main class="admin-content" style="max-width: 800px; margin: 0 auto;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="mb-0">Create New Booking</h1>
            <a th:href="@{/customer/bookings}" class="btn btn-outline-secondary">← My Bookings</a>
        </div>

        <div th:if="${#lists.isEmpty(cars)}" class="alert alert-warning">
            No available cars right now. Please contact admin.
        </div>

        <form th:action="@{/customer/bookings}" th:object="${bookingRequest}" method="post"
              class="card border p-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="mb-3">
                <label class="form-label">Select Cars (one or many)</label>
                <select th:field="*{carIds}" multiple class="form-select" size="6"
                        th:classappend="${#fields.hasErrors('carIds')} ? 'is-invalid'">
                    <option th:each="c : ${cars}" th:value="${c.id}"
                            th:text="${c.carName + ' (' + c.color + ', ' + c.capacity + ' seats) - ' + #numbers.formatDecimal(c.rentPrice, 0, 'COMMA', 2, 'POINT') + ' đ/day'}">
                    </option>
                </select>
                <small class="text-muted">Hold Ctrl/Shift to select multiple cars</small>
                <div class="invalid-feedback" th:errors="*{carIds}"></div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Pickup Date</label>
                    <input type="date" th:field="*{pickupDate}" class="form-control"
                           th:classappend="${#fields.hasErrors('pickupDate')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{pickupDate}"></div>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Return Date</label>
                    <input type="date" th:field="*{returnDate}" class="form-control"
                           th:classappend="${#fields.hasErrors('returnDate')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{returnDate}"></div>
                </div>
            </div>

            <div class="d-flex justify-content-between mt-4">
                <a th:href="@{/customer/bookings}" class="btn btn-outline-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Book Now</button>
            </div>
        </form>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
