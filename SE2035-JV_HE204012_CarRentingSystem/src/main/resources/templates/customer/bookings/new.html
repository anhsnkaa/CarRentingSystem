<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="app-layout">
    <main class="app-content narrow">
        <div class="page-head">
            <h1>New Booking</h1>
            <div class="actions">
                <a th:href="@{/customer/bookings}" class="btn btn-ghost btn-sm">← My Bookings</a>
            </div>
        </div>

        <div class="toast toast-err" th:if="${#lists.isEmpty(cars)}">
            No available cars right now. Please contact admin.
        </div>

        <form th:action="@{/customer/bookings}" th:object="${bookingRequest}" method="post" class="form-card"
              th:if="${!#lists.isEmpty(cars)}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="field">
                <label>Select Cars (one or many)</label>
                <select th:field="*{carIds}" multiple size="6" required>
                    <option th:each="c : ${cars}" th:value="${c.id}"
                            th:text="${c.carName + ' (' + c.color + ', ' + c.capacity + ' seats) - ' + #numbers.formatDecimal(c.rentPrice, 0, 'COMMA', 0, 'POINT') + ' đ/day'}">
                    </option>
                </select>
                <span class="hint">Hold Ctrl/Shift to select multiple cars</span>
                <span class="err" th:errors="*{carIds}"></span>
            </div>

            <div class="field-row cols-2">
                <div class="field">
                    <label>Pickup Date</label>
                    <input type="date" th:field="*{pickupDate}" required>
                    <span class="err" th:errors="*{pickupDate}"></span>
                </div>
                <div class="field">
                    <label>Return Date</label>
                    <input type="date" th:field="*{returnDate}" required>
                    <span class="err" th:errors="*{returnDate}"></span>
                </div>
            </div>

            <div class="form-actions">
                <a th:href="@{/customer/bookings}" class="btn btn-ghost">Cancel</a>
                <button type="submit" class="btn">Book Now</button>
            </div>
        </form>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
