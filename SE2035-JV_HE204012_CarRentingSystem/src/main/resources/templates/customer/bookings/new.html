<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Choose a car</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
    <style>
        .car-grid {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(3, 1fr);
            margin-top: 8px;
        }
        .car-tile {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--paper);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
            min-width: 0;
        }
        .car-tile:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
            color: inherit;
        }
        .car-tile:focus { outline: none; }
        .car-tile:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }
        .car-tile-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }
        .car-tile h3 {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.3;
            margin: 0;
            overflow-wrap: anywhere;
            min-width: 0;
        }
        .car-tile .producer {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .car-tile .meta {
            font-size: 12px;
            color: var(--muted);
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .car-tile .meta span::before { content: "·"; margin-right: 6px; color: var(--line); }
        .car-tile .meta span:first-child::before { content: none; }
        .car-tile .desc {
            font-size: 13px;
            color: var(--ink-2);
            margin: 0;
            line-height: 1.5;
        }
        .car-tile-foot {
            margin-top: auto;
            padding-top: 12px;
            border-top: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }
        .car-tile-foot .price {
            font-family: var(--font);
            font-size: 16px;
            font-weight: 600;
            color: var(--ink);
        }
        .car-tile-foot .price small {
            font-size: 11px;
            color: var(--muted);
            font-weight: 400;
            margin-left: 2px;
        }
        .car-tile-foot .arrow {
            color: var(--accent);
            font-weight: 500;
        }
    </style>
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="app-layout">
    <main class="app-content">
        <div class="page-head">
            <h1>Choose a car</h1>
            <div class="actions">
                <a th:href="@{/customer/bookings}" class="btn btn-ghost btn-sm">My Bookings</a>
            </div>
        </div>

        <p class="sub" style="margin-bottom:24px;">Click any car to view details and reviews.</p>

        <div class="toast toast-err" th:if="${#lists.isEmpty(cars)}">
            No cars available right now. Please contact admin.
        </div>

        <div class="car-grid" th:if="${!#lists.isEmpty(cars)}">
            <a class="car-tile"
               th:each="c : ${cars}"
               th:href="@{/customer/bookings/cars/{id}(id=${c.id})}"
               th:style="${c.status != 'Available' ? 'opacity:0.55;' : ''}">
                <div class="car-tile-head">
                    <div>
                        <p class="producer"
                           th:text="${producerMap[c.producerId] != null ? producerMap[c.producerId].producerName : '-'}">Producer</p>
                        <h3 th:text="${c.carName}">Car Name</h3>
                    </div>
                    <span th:class="${c.status == 'Available' ? 'pill pill-ok' : 'pill pill-muted'}"
                          th:text="${c.status}">Available</span>
                </div>

                <div class="meta">
                    <span><span th:text="${c.carModelYear}">2024</span></span>
                    <span th:text="${c.color}">White</span>
                    <span><span th:text="${c.capacity}">5</span> seats</span>
                </div>

                <p class="desc" th:text="${#strings.abbreviate(c.description, 90)}">Description...</p>

                <div class="car-tile-foot">
                    <span class="price">
                        <span th:text="${#numbers.formatDecimal(c.rentPrice, 0, 'COMMA', 0, 'POINT')}">0</span> đ
                        <small>/ day</small>
                    </span>
                    <span class="arrow">View →</span>
                </div>
            </a>
        </div>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
