<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar(activeMenu='customers')}"></div>

    <main class="app-content">
        <div class="page-head">
            <h1>Customers</h1>
        </div>

        <div th:if="${toastMessage}" th:class="${toastType == 'success' ? 'toast toast-ok' : 'toast toast-err'}"
             th:text="${toastMessage}"></div>

        <form method="get" class="filter-bar">
            <input type="text" name="keyword" placeholder="Search name, mobile, identity..." th:value="${keyword}">
            <span></span>
            <span></span>
            <button type="submit" class="btn btn-ghost">Search</button>
        </form>

        <div class="table-wrap" th:if="${customers.totalElements > 0}">
            <table class="dtable">
                <thead>
                    <tr>
                        <th>Full Name</th>
                        <th>Mobile</th>
                        <th>Identity</th>
                        <th>Licence</th>
                        <th>Birthday</th>
                        <th class="actions">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${customers}">
                        <td th:text="${c.fullName}"></td>
                        <td th:text="${c.mobile}"></td>
                        <td th:text="${c.identityCard}"></td>
                        <td th:text="${c.licenceNumber}"></td>
                        <td th:text="${c.birthday}"></td>
                        <td class="actions">
                            <a th:href="@{/admin/customers/{id}/edit(id=${c.id})}" class="btn btn-sm btn-ghost">Edit</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="card-empty" th:if="${customers.totalElements == 0}">No customers found.</div>

        <div class="pager" th:if="${totalPages > 0}">
            <span class="info">
                Page <span th:text="${currentPage}">1</span> / <span th:text="${totalPages}">1</span>
                · Total: <span th:text="${customers.totalElements}">0</span>
            </span>
            <div class="pages">
                <a th:class="${currentPage == 1 ? 'disabled' : ''}"
                   th:href="@{/admin/customers(keyword=${keyword}, page=${currentPage - 1})}">Prev</a>
                <span th:each="i : ${#numbers.sequence(1, totalPages)}"
                      th:class="${currentPage == i ? 'current' : ''}">
                    <a th:if="${currentPage != i}"
                       th:href="@{/admin/customers(keyword=${keyword}, page=${i})}" th:text="${i}"></a>
                    <span th:if="${currentPage == i}" th:text="${i}"></span>
                </span>
                <a th:class="${currentPage == totalPages ? 'disabled' : ''}"
                   th:href="@{/admin/customers(keyword=${keyword}, page=${currentPage + 1})}">Next</a>
            </div>
        </div>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
