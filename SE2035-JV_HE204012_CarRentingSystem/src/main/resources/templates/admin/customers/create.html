<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar(activeMenu='customers')}"></div>

    <main class="app-content narrow">
        <div class="page-head">
            <h1>Create Customer Account</h1>
            <div class="actions">
                <a th:href="@{/admin/customers}" class="btn btn-ghost btn-sm">Back</a>
            </div>
        </div>

        <div th:if="${error}" class="toast toast-err" th:text="${error}"></div>

        <form th:action="@{/admin/customers/new}"
              th:object="${createAccountRequest}" method="post" class="form-card">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="section-title">Account</div>

            <div class="field">
                <label>Account name (login username)</label>
                <input type="text" th:field="*{accountName}"
                       placeholder="e.g. john.doe" required>

                <span class="err" th:errors="*{accountName}"></span>
            </div>

            <div class="field">
                <label>Password</label>
                <input type="password" th:field="*{password}" required>
                <span class="err" th:errors="*{password}"></span>
            </div>

            <div class="field">
                <label>Email</label>
                <input type="email" th:field="*{email}" required>
                <span class="err" th:errors="*{email}"></span>
            </div>

            <div class="section-title">Customer profile</div>

            <div class="field">
                <label>Full Name</label>
                <input type="text" th:field="*{fullName}" required>
                <span class="err" th:errors="*{fullName}"></span>
            </div>

            <div class="field-row cols-2">
                <div class="field">
                    <label>Mobile</label>
                    <input type="text" th:field="*{mobile}" required>
                    <span class="err" th:errors="*{mobile}"></span>
                </div>
                <div class="field">
                    <label>Birthday</label>
                    <input type="date" name="birthday" id="birthday"
                           th:value="${createAccountRequest.birthday != null} ? ${#temporals.format(createAccountRequest.birthday, 'yyyy-MM-dd')} : ''"
                           required>
                    <span class="err" th:errors="*{birthday}"></span>
                </div>
            </div>

            <div class="field-row cols-2">
                <div class="field">
                    <label>Identity Card</label>
                    <input type="text" th:field="*{identityCard}" required>
                    <span class="err" th:errors="*{identityCard}"></span>
                </div>
                <div class="field">
                    <label>Licence Number</label>
                    <input type="text" th:field="*{licenceNumber}" required>
                    <span class="err" th:errors="*{licenceNumber}"></span>
                </div>
            </div>

            <div class="field">
                <label>Licence Date</label>
                <input type="date" name="licenceDate" id="licenceDate"
                       th:value="${createAccountRequest.licenceDate != null} ? ${#temporals.format(createAccountRequest.licenceDate, 'yyyy-MM-dd')} : ''"
                       required>
                <span class="err" th:errors="*{licenceDate}"></span>
            </div>

            <div class="form-actions">
                <a th:href="@{/admin/customers}" class="btn btn-ghost">Cancel</a>
                <button type="submit" class="btn">Create account</button>
            </div>
        </form>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
