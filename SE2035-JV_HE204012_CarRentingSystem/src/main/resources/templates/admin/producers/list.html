<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Producers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar(activeMenu='producers')}"></div>

    <main class="app-content">
        <div class="page-head">
            <h1>Producers</h1>
            <div class="actions">
                <a th:href="@{/admin/producers/new}" class="btn">+ Add Producer</a>
            </div>
        </div>

        <div th:if="${toastMessage}" th:class="${toastType == 'success' ? 'toast toast-ok' : 'toast toast-err'}"
             th:text="${toastMessage}"></div>

        <div class="table-wrap" th:if="${producers.totalElements > 0}">
            <table class="dtable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Address</th>
                        <th>Country</th>
                        <th class="actions">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${producers}">
                        <td th:text="${p.producerName}"></td>
                        <td th:text="${p.address}"></td>
                        <td th:text="${p.country}"></td>
                        <td class="actions">
                            <a th:href="@{/admin/producers/{id}/edit(id=${p.id})}" class="btn btn-sm btn-ghost">Edit</a>
                            <form th:action="@{/admin/producers/{id}/delete(id=${p.id})}" method="post"
                                  onsubmit="return confirm('Delete this producer?');">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="card-empty" th:if="${producers.totalElements == 0}">No producers yet.</div>

        <div class="pager" th:if="${totalPages > 0}">
            <span class="info">
                Page <span th:text="${currentPage}">1</span> / <span th:text="${totalPages}">1</span>
                · Total: <span th:text="${producers.totalElements}">0</span>
            </span>
            <div class="pages">
                <a th:class="${currentPage == 1 ? 'disabled' : ''}"
                   th:href="@{/admin/producers(page=${currentPage - 1}, size=${pageSize})}">Prev</a>
                <span th:each="i : ${#numbers.sequence(1, totalPages)}"
                      th:class="${currentPage == i ? 'current' : ''}">
                    <a th:if="${currentPage != i}"
                       th:href="@{/admin/producers(page=${i}, size=${pageSize})}" th:text="${i}"></a>
                    <span th:if="${currentPage == i}" th:text="${i}"></span>
                </span>
                <a th:class="${currentPage == totalPages ? 'disabled' : ''}"
                   th:href="@{/admin/producers(page=${currentPage + 1}, size=${pageSize})}">Next</a>
            </div>
        </div>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
