<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${producerId != null ? 'Edit Producer' : 'New Producer'}">Producer Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="admin-layout">
    <div th:replace="~{fragments/sidebar :: sidebar(activeMenu='producers')}"></div>

    <main class="admin-content" style="max-width: 800px;">
        <h1 class="mb-4" th:text="${producerId != null ? 'Edit Producer' : 'New Producer'}"></h1>

        <form th:action="${producerId != null ? '/admin/producers/' + producerId : '/admin/producers'}"
              th:object="${producerRequest}" method="post" class="card border p-4">

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="mb-3">
                <label class="form-label">Producer Name</label>
                <input type="text" th:field="*{producerName}" class="form-control"
                       th:classappend="${#fields.hasErrors('producerName')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{producerName}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Address</label>
                <input type="text" th:field="*{address}" class="form-control"
                       th:classappend="${#fields.hasErrors('address')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{address}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Country</label>
                <input type="text" th:field="*{country}" class="form-control"
                       th:classappend="${#fields.hasErrors('country')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{country}"></div>
            </div>

            <div class="d-flex justify-content-between mt-4">
                <a th:href="@{/admin/producers}" class="btn btn-outline-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary"
                        th:text="${producerId != null ? 'Update' : 'Create'}">Save</button>
            </div>
        </form>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
