<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${producerId != null ? 'Edit Producer' : 'New Producer'}">Producer Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar(activeMenu='producers')}"></div>

    <main class="app-content narrow">
        <div class="page-head">
            <h1 th:text="${producerId != null ? 'Edit Producer' : 'New Producer'}">Producer Form</h1>
            <div class="actions">
                <a th:href="@{/admin/producers}" class="btn btn-ghost btn-sm">Back</a>
            </div>
        </div>

        <form th:action="${producerId != null ? '/admin/producers/' + producerId : '/admin/producers'}"
              th:object="${producerRequest}" method="post" class="form-card">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="field">
                <label>Producer Name</label>
                <input type="text" th:field="*{producerName}" required>
                <span class="err" th:errors="*{producerName}"></span>
            </div>

            <div class="field">
                <label>Address</label>
                <input type="text" th:field="*{address}" required>
                <span class="err" th:errors="*{address}"></span>
            </div>

            <div class="field">
                <label>Country</label>
                <input type="text" th:field="*{country}" required>
                <span class="err" th:errors="*{country}"></span>
            </div>

            <div class="form-actions">
                <a th:href="@{/admin/producers}" class="btn btn-ghost">Cancel</a>
                <button type="submit" class="btn" th:text="${producerId != null ? 'Update' : 'Create'}">Save</button>
            </div>
        </form>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
