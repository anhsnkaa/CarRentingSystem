<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cars</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar(activeMenu='cars')}"></div>

    <main class="app-content">
        <div class="page-head">
            <h1>Cars</h1>
            <div class="actions">
                <a th:href="@{/admin/cars/new}" class="btn">+ Add Car</a>
            </div>
        </div>

        <div th:if="${toastMessage}" th:class="${toastType == 'success' ? 'toast toast-ok' : 'toast toast-err'}"
             th:text="${toastMessage}"></div>

        <form method="get" class="filter-bar">
            <input type="text" name="keyword" placeholder="Search by name..." th:value="${keyword}">
            <select name="status">
                <option value="">All Status</option>
                <option value="Available" th:selected="${status == 'Available'}">Available</option>
                <option value="Rented" th:selected="${status == 'Rented'}">Rented</option>
                <option value="Unavailable" th:selected="${status == 'Unavailable'}">Unavailable</option>
            </select>
            <span></span>
            <button type="submit" class="btn btn-ghost">Filter</button>
        </form>

        <div class="table-wrap" th:if="${cars.totalElements > 0}">
            <table class="dtable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Year</th>
                        <th>Color</th>
                        <th>Capacity</th>
                        <th>Price</th>
                        <th>Status</th>
                        <th class="actions">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="car : ${cars}">
                        <td th:text="${car.carName}"></td>
                        <td class="num" th:text="${car.carModelYear}"></td>
                        <td th:text="${car.color}"></td>
                        <td class="num" th:text="${car.capacity}"></td>
                        <td class="num" th:text="${#numbers.formatDecimal(car.rentPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                        <td>
                            <span th:class="${car.status == 'Available' ? 'pill pill-ok' : (car.status == 'Rented' ? 'pill pill-warn' : 'pill pill-muted')}"
                                  th:text="${car.status}"></span>
                        </td>
                        <td class="actions">
                            <a th:href="@{/admin/cars/{id}(id=${car.id})}" class="btn btn-sm btn-ghost">View</a>
                            <a th:href="@{/admin/cars/{id}/edit(id=${car.id})}" class="btn btn-sm btn-ghost">Edit</a>
                            <form th:if="${activeRentalCounts[car.id] == null or activeRentalCounts[car.id] == 0}"
                                  th:action="@{/admin/cars/{id}/delete(id=${car.id})}" method="post"
                                  onsubmit="return confirm('Delete this car?');">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                            </form>
                            <span th:if="${activeRentalCounts[car.id] != null and activeRentalCounts[car.id] > 0}"
                                  class="btn btn-sm"
                                  style="background:var(--paper-2); color:var(--muted); cursor:not-allowed; border:1px solid var(--line);"
                                  title="Cannot delete: car is currently rented">
                                In use
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="card-empty" th:if="${cars.totalElements == 0}">No cars found.</div>

        <div class="pager" th:if="${totalPages > 0}">
            <span class="info">
                Page <span th:text="${currentPage}">1</span> / <span th:text="${totalPages}">1</span>
                · Total: <span th:text="${cars.totalElements}">0</span>
            </span>
            <div class="pages">
                <a th:class="${currentPage == 1 ? 'disabled' : ''}"
                   th:href="@{/admin/cars(keyword=${keyword}, status=${status}, page=${currentPage - 1})}">Prev</a>
                <span th:each="i : ${#numbers.sequence(1, totalPages)}"
                      th:class="${currentPage == i ? 'current' : ''}">
                    <a th:if="${currentPage != i}"
                       th:href="@{/admin/cars(keyword=${keyword}, status=${status}, page=${i})}"
                       th:text="${i}"></a>
                    <span th:if="${currentPage == i}" th:text="${i}"></span>
                </span>
                <a th:class="${currentPage == totalPages ? 'disabled' : ''}"
                   th:href="@{/admin/cars(keyword=${keyword}, status=${status}, page=${currentPage + 1})}">Next</a>
            </div>
        </div>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
