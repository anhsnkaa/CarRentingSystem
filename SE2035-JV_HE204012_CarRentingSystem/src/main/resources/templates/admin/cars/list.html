<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cars</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="admin-layout">
    <div th:replace="~{fragments/sidebar :: sidebar(activeMenu='cars')}"></div>

    <main class="admin-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="mb-0">Cars</h1>
            <a th:href="@{/admin/cars/new}" class="btn btn-primary">+ Add Car</a>
        </div>

        <div th:if="${toastMessage}" class="alert alert-dismissible fade show"
             th:classappend="${toastType == 'success' ? 'alert-success' : 'alert-danger'}">
            <span th:text="${toastMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <form method="get" class="row mb-3 g-2">
            <div class="col-md-4">
                <input type="text" name="keyword" class="form-control" placeholder="Search by name..."
                       th:value="${keyword}">
            </div>
            <div class="col-md-3">
                <select name="status" class="form-select">
                    <option value="">All Status</option>
                    <option value="Available" th:selected="${status == 'Available'}">Available</option>
                    <option value="Rented" th:selected="${status == 'Rented'}">Rented</option>
                    <option value="Unavailable" th:selected="${status == 'Unavailable'}">Unavailable</option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-secondary w-100">Filter</button>
            </div>
        </form>

        <div class="card border">
            <table class="table table-borderless mb-0">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Car Name</th>
                    <th>Year</th>
                    <th>Color</th>
                    <th>Capacity</th>
                    <th>Rent Price</th>
                    <th>Status</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${cars.totalElements == 0}">
                    <td colspan="8" class="text-center text-muted py-4">No cars found</td>
                </tr>
                <tr th:each="car : ${cars}">
                    <td th:text="${car.id}"></td>
                    <td th:text="${car.carName}"></td>
                    <td th:text="${car.carModelYear}"></td>
                    <td th:text="${car.color}"></td>
                    <td th:text="${car.capacity}"></td>
                    <td th:text="${#numbers.formatDecimal(car.rentPrice, 0, 'COMMA', 2, 'POINT')} + ' đ/day'"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${car.status == 'Available' ? 'bg-success' : (car.status == 'Rented' ? 'bg-warning text-dark' : 'bg-secondary')}"
                              th:text="${car.status}"></span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/admin/cars/{id}/edit(id=${car.id})}" class="btn btn-sm btn-outline-primary">Edit</a>
                        <form th:action="@{/admin/cars/{id}/delete(id=${car.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Delete this car?');">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-3" th:if="${totalPages > 1}">
            <small class="text-muted">
                Page <span th:text="${currentPage}">1</span> of <span th:text="${totalPages}">1</span>
                | Total: <span th:text="${cars.totalElements}">0</span> car(s)
            </small>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${currentPage == 1 ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/admin/cars(keyword=${keyword}, status=${status}, page=${currentPage - 1})}">Previous</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                        th:classappend="${currentPage == i ? 'active' : ''}">
                        <a class="page-link" th:href="@{/admin/cars(keyword=${keyword}, status=${status}, page=${i})}" th:text="${i}"></a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage == totalPages ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/admin/cars(keyword=${keyword}, status=${status}, page=${currentPage + 1})}">Next</a>
                    </li>
                </ul>
            </nav>
        </div>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
