<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${carId != null ? 'Edit Car' : 'New Car'}">Car Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="admin-layout">
    <div th:replace="~{fragments/sidebar :: sidebar(activeMenu='cars')}"></div>

    <main class="admin-content" style="max-width: 800px;">
        <h1 class="mb-4" th:text="${carId != null ? 'Edit Car' : 'New Car'}"></h1>

        <form th:action="${carId != null ? '/admin/cars/' + carId : '/admin/cars'}"
              th:object="${carRequest}" method="post" class="card border p-4">

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="mb-3">
                <label class="form-label">Car Name</label>
                <input type="text" th:field="*{carName}" class="form-control"
                       th:classappend="${#fields.hasErrors('carName')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{carName}"></div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Model Year</label>
                    <input type="number" th:field="*{carModelYear}" class="form-control" min="1900" max="2100"
                           th:classappend="${#fields.hasErrors('carModelYear')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{carModelYear}"></div>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Color</label>
                    <input type="text" th:field="*{color}" class="form-control"
                           th:classappend="${#fields.hasErrors('color')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{color}"></div>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Capacity</label>
                    <input type="number" th:field="*{capacity}" class="form-control" min="1"
                           th:classappend="${#fields.hasErrors('capacity')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{capacity}"></div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea th:field="*{description}" class="form-control" rows="3"
                          th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"></textarea>
                <div class="invalid-feedback" th:errors="*{description}"></div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Import Date</label>
                    <input type="date" th:field="*{importDate}" class="form-control"
                           th:classappend="${#fields.hasErrors('importDate')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{importDate}"></div>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Producer</label>
                    <select th:field="*{producerId}" class="form-select"
                            th:classappend="${#fields.hasErrors('producerId')} ? 'is-invalid'">
                        <option value="">-- Select --</option>
                        <option th:each="p : ${producers}" th:value="${p.id}" th:text="${p.producerName}"></option>
                    </select>
                    <div class="invalid-feedback" th:errors="*{producerId}"></div>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Rent Price (đ/day)</label>
                    <input type="number" step="0.01" th:field="*{rentPrice}" class="form-control"
                           th:classappend="${#fields.hasErrors('rentPrice')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{rentPrice}"></div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Status</label>
                <select th:field="*{status}" class="form-select">
                    <option value="Available">Available</option>
                    <option value="Rented">Rented</option>
                    <option value="Unavailable">Unavailable</option>
                </select>
            </div>

            <div class="d-flex justify-content-between mt-4">
                <a th:href="@{/admin/cars}" class="btn btn-outline-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary"
                        th:text="${carId != null ? 'Update' : 'Create'}">Save</button>
            </div>
        </form>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
