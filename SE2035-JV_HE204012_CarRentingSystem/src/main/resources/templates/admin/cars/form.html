<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${carId != null ? 'Edit Car' : 'New Car'}">Car Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar(activeMenu='cars')}"></div>

    <main class="app-content narrow">
        <div class="page-head">
            <h1 th:text="${carId != null ? 'Edit Car' : 'New Car'}">Car Form</h1>
            <div class="actions">
                <a th:href="@{/admin/cars}" class="btn btn-ghost btn-sm">Back</a>
            </div>
        </div>

        <form th:action="${carId != null ? '/admin/cars/' + carId : '/admin/cars'}"
              th:object="${carRequest}" method="post" class="form-card">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="field">
                <label>Car Name</label>
                <input type="text" th:field="*{carName}" required>
                <span class="err" th:errors="*{carName}"></span>
            </div>

            <div class="field-row cols-3">
                <div class="field">
                    <label>Model Year</label>
                    <input type="number" th:field="*{carModelYear}" min="1900" max="2100" required>
                    <span class="err" th:errors="*{carModelYear}"></span>
                </div>
                <div class="field">
                    <label>Color</label>
                    <input type="text" th:field="*{color}" required>
                    <span class="err" th:errors="*{color}"></span>
                </div>
                <div class="field">
                    <label>Capacity</label>
                    <input type="number" th:field="*{capacity}" min="1" required>
                    <span class="err" th:errors="*{capacity}"></span>
                </div>
            </div>

            <div class="field">
                <label>Description</label>
                <textarea th:field="*{description}" rows="3"></textarea>
                <span class="err" th:errors="*{description}"></span>
            </div>

            <div class="field-row cols-3">
                <div class="field">
                    <label>Import Date</label>
                    <input type="date" class="auto-today" th:field="*{importDate}" required>
                    <span class="err" th:errors="*{importDate}"></span>
                </div>
                <div class="field">
                    <label>Producer</label>
                    <select th:field="*{producerId}" required>
                        <option value="">-- Select --</option>
                        <option th:each="p : ${producers}" th:value="${p.id}" th:text="${p.producerName}"></option>
                    </select>
                    <span class="err" th:errors="*{producerId}"></span>
                </div>
                <div class="field">
                    <label>Rent Price (đ/day)</label>
                    <input type="number" step="0.01" th:field="*{rentPrice}" required>
                    <span class="err" th:errors="*{rentPrice}"></span>
                </div>
            </div>

            <div class="field">
                <label>Status</label>
                <input type="text" th:field="*{status}" disabled>
                <!-- Keep status in form submission via hidden field -->
                <input type="hidden" th:field="*{status}">
            </div>

            <div class="form-actions">
                <a th:href="@{/admin/cars}" class="btn btn-ghost">Cancel</a>
                <button type="submit" class="btn" th:text="${carId != null ? 'Update' : 'Create'}">Save</button>
            </div>
        </form>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
