<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Statistics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar(activeMenu='reports')}"></div>

    <main class="app-content">
        <div class="page-head">
            <h1>Statistics</h1>
        </div>

        <form th:action="@{/admin/reports}" method="get" th:object="${reportRequest}" class="form-card">
            <div class="field-row cols-3">
                <div class="field">
                    <label>Start Date</label>
                    <input type="date" th:field="*{startDate}">
                </div>
                <div class="field">
                    <label>End Date</label>
                    <input type="date" th:field="*{endDate}">
                </div>
                <div class="field">
                    <label>&nbsp;</label>
                    <button type="submit" class="btn">Generate Report</button>
                </div>
            </div>
            <div th:if="${error}" class="toast toast-err" th:text="${error}"></div>
        </form>

        <div th:if="${rentals != null}" class="stat-grid" style="margin-top:24px;">
            <div class="stat-card">
                <div class="label">Total Rentals</div>
                <div class="num" th:text="${rentalCount}">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Total Revenue</div>
                <div class="num" th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT')} + ' đ'">0</div>
            </div>
        </div>

        <div th:if="${rentals != null}" class="table-wrap" style="margin-top:16px;">
            <table class="dtable" th:if="${!#lists.isEmpty(rentals)}">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Pickup</th>
                        <th>Return</th>
                        <th>Car</th>
                        <th>Days</th>
                        <th>Price</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${rentals}">
                        <td class="num" th:text="${r.id}"></td>
                        <td th:text="${r.pickupDate}"></td>
                        <td th:text="${r.returnDate}"></td>
                        <td th:text="${carMap[r.carId] != null ? carMap[r.carId].carName : 'Car ' + r.carId}"></td>
                        <td class="num" th:text="${T(java.time.temporal.ChronoUnit).DAYS.between(r.pickupDate, r.returnDate)}"></td>
                        <td class="num" th:text="${#numbers.formatDecimal(r.rentPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                        <td>
                            <span th:class="${r.status == 'Active' ? 'pill pill-active' : (r.status == 'Completed' ? 'pill pill-ok' : 'pill pill-muted')}"
                                  th:text="${r.status}"></span>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div class="card-empty" th:if="${#lists.isEmpty(rentals)}">No rentals in this period.</div>
        </div>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
