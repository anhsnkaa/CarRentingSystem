<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Statistics Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="admin-layout">
    <div th:replace="~{fragments/sidebar :: sidebar(activeMenu='reports')}"></div>

    <main class="admin-content">
        <h1 class="mb-4">Rental Report (by period)</h1>

        <form th:action="@{/admin/reports}" method="get" th:object="${reportRequest}" class="card border p-4 mb-4">
            <div class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label">Start Date</label>
                    <input type="date" th:field="*{startDate}" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">End Date</label>
                    <input type="date" th:field="*{endDate}" class="form-control">
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-primary w-100">Generate Report</button>
                </div>
            </div>
            <div th:if="${error}" class="alert alert-danger mt-3 mb-0" th:text="${error}"></div>
        </form>

        <div th:if="${rentals != null}" class="row mb-4">
            <div class="col-md-4">
                <div class="card border">
                    <div class="card-body">
                        <div class="text-muted small text-uppercase">Total Rentals</div>
                        <div class="fs-3 fw-bold mt-2" th:text="${rentalCount}">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border">
                    <div class="card-body">
                        <div class="text-muted small text-uppercase">Total Revenue</div>
                        <div class="fs-3 fw-bold mt-2"
                             th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 2, 'POINT')} + ' đ'">0</div>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${rentals != null}" class="card border">
            <table class="table table-borderless mb-0">
                <thead class="table-light">
                <tr>
                    <th>Rental ID</th>
                    <th>Pickup Date</th>
                    <th>Return Date</th>
                    <th>Car</th>
                    <th>Days</th>
                    <th>Rent Price</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(rentals)}">
                    <td colspan="7" class="text-center text-muted py-4">No rentals in this period</td>
                </tr>
                <tr th:each="r : ${rentals}">
                    <td th:text="${r.id}"></td>
                    <td th:text="${r.pickupDate}"></td>
                    <td th:text="${r.returnDate}"></td>
                    <td>
                        <span th:text="${carMap[r.carId] != null ? carMap[r.carId].carName : 'Car ' + r.carId}"></span>
                    </td>
                    <td th:text="${T(java.time.temporal.ChronoUnit).DAYS.between(r.pickupDate, r.returnDate)}"></td>
                    <td th:text="${#numbers.formatDecimal(r.rentPrice, 0, 'COMMA', 2, 'POINT')} + ' đ'"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${r.status == 'Active' ? 'bg-primary' : (r.status == 'Completed' ? 'bg-success' : 'bg-secondary')}"
                              th:text="${r.status}"></span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
