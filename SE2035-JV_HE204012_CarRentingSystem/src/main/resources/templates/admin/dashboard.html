<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar(activeMenu='dashboard')}"></div>

    <main class="app-content">
        <div class="page-head">
            <div>
                <h1>Dashboard</h1>
                <p class="sub">Signed in as <span sec:authentication="name">admin</span></p>
            </div>
        </div>

        <div class="stat-grid">
            <div class="stat-card">
                <div class="label">Producers</div>
                <div class="num" th:text="${producerCount}">0</div>
                <a th:href="@{/admin/producers}" class="link">Manage →</a>
            </div>
            <div class="stat-card">
                <div class="label">Cars</div>
                <div class="num" th:text="${carCount}">0</div>
                <a th:href="@{/admin/cars}" class="link">Manage →</a>
            </div>
            <div class="stat-card">
                <div class="label">Customers</div>
                <div class="num" th:text="${customerCount}">0</div>
                <a th:href="@{/admin/customers}" class="link">Manage →</a>
            </div>
            <div class="stat-card">
                <div class="label">Rentals</div>
                <div class="num" th:text="${rentalCount}">0</div>
                <a th:href="@{/admin/rentals}" class="link">Manage →</a>
            </div>
        </div>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
