<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="admin-layout">
    <div th:replace="~{fragments/sidebar :: sidebar(activeMenu='dashboard')}"></div>

    <main class="admin-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="mb-0">Welcome, Admin!</h1>
        </div>

        <p class="text-muted">
            You are logged in as
            <span sec:authentication="name">admin</span>
        </p>

        <div class="row mt-4">
            <div class="col-md-4 mb-3">
                <div class="card border">
                    <div class="card-body">
                        <div class="text-muted small text-uppercase">Producers</div>
                        <div class="fs-3 fw-bold mt-2">3</div>
                        <a th:href="@{/admin/producers}" class="small text-decoration-none">Manage →</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card border">
                    <div class="card-body">
                        <div class="text-muted small text-uppercase">Cars</div>
                        <div class="fs-3 fw-bold mt-2">6</div>
                        <span class="small text-muted">(coming soon)</span>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card border">
                    <div class="card-body">
                        <div class="text-muted small text-uppercase">Customers</div>
                        <div class="fs-3 fw-bold mt-2">3</div>
                        <span class="small text-muted">(coming soon)</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
