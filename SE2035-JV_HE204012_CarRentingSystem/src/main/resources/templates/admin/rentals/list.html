<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rentals</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
    <style>
        .active-section {
            background: var(--accent-soft);
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .active-section h3 {
            margin: 0 0 12px;
            font-size: 16px;
            font-weight: 600;
            color: var(--ink);
        }
        .active-row {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 14px 0;
            border-top: 1px solid #bfdbfe;
        }
        .active-row:first-of-type { border-top: none; padding-top: 0; }
        .active-row:last-of-type { padding-bottom: 0; }
        .active-row .col {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }
        .active-row .col.col-customer { flex: 1 1 18%; }
        .active-row .col.col-car      { flex: 1 1 25%; }
        .active-row .col.col-dates    { flex: 1 1 22%; }
        .active-row .col.col-action   { flex: 0 0 auto; margin-left: auto; }
        .active-row .label { font-size: 12px; color: var(--muted); }
        .active-row .val { font-size: 14px; color: var(--ink); font-weight: 500; }
        .active-row .btn-mark {
            white-space: nowrap;
            padding: 8px 16px;
        }
    </style>
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar(activeMenu='rentals')}"></div>

    <main class="app-content">
        <div class="page-head">
            <h1>Rentals</h1>
        </div>

        <div th:if="${toastMessage}" th:class="${toastType == 'success' ? 'toast toast-ok' : 'toast toast-err'}"
             th:text="${toastMessage}"></div>


        <form method="get" class="filter-bar">
            <input type="date" class="auto-today" name="from" th:value="${from}">
            <input type="date" class="auto-today" name="to" th:value="${to}">
            <select name="status">
                <option value="">All Status</option>
                <option value="Pending" th:selected="${status == 'Pending'}">Pending</option>
                <option value="Active" th:selected="${status == 'Active'}">Active</option>
                <option value="Completed" th:selected="${status == 'Completed'}">Completed</option>
                <option value="Cancelled" th:selected="${status == 'Cancelled'}">Cancelled</option>
            </select>
            <button type="submit" class="btn btn-ghost">Filter</button>
        </form>

        <div class="table-wrap" th:if="${rentals.totalElements > 0}">
            <table class="dtable">
                <thead>
                    <tr>
                        <th>Customer</th>
                        <th>Car</th>
                        <th>Dates</th>
                        <th>Price</th>
                        <th>Status</th>
                        <th class="actions">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${rentals}">
                        <td th:text="${customerMap[r.customerId] != null ? customerMap[r.customerId].fullName : 'Customer #' + r.customerId}">Customer</td>
                        <td th:text="${carMap[r.carId] != null ? carMap[r.carId].carName : 'Car #' + r.carId}">Car</td>
                        <td>
                            <span th:text="${r.pickupDate}">2026-01-01</span>
                            <span style="color:var(--muted); margin:0 6px;">→</span>
                            <span th:text="${r.returnDate}">2026-01-05</span>
                        </td>
                        <td class="num" th:text="${#numbers.formatDecimal(r.rentPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                        <td>
                            <span th:class="${r.status == 'Pending' ? 'pill pill-pending' :
                                             (r.status == 'Active' ? 'pill pill-active' :
                                             (r.status == 'Completed' ? 'pill pill-ok' : 'pill pill-cancel'))}"
                                  th:text="${r.status}"></span>
                        </td>
                        <td class="actions">
                            <a th:href="@{/admin/rentals/{id}(id=${r.id})}" class="btn btn-sm btn-ghost">View</a>

                            <form th:if="${r.status == 'Pending' and (carMap[r.carId] == null or carMap[r.carId].status == 'Available')}"
                                  th:action="@{/admin/rentals/{id}/approve(id=${r.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm"
                                        onclick="return confirm('Approve this rental? Car will be marked as Rented.');">Approve</button>
                            </form>
                            <form th:if="${r.status == 'Pending'}"
                                  th:action="@{/admin/rentals/{id}/reject(id=${r.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-danger"
                                        onclick="return confirm('Reject this rental?');">Reject</button>
                            </form>

                            <form th:if="${r.status == 'Active'}"
                                  th:action="@{/admin/rentals/{id}/complete(id=${r.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-success"
                                        style="white-space:nowrap;"
                                        onclick="return confirm('Confirm car returned? Status will be set to Completed.');">Mark Returned</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="card-empty" th:if="${rentals.totalElements == 0}">No rentals found.</div>

        <div class="pager" th:if="${totalPages > 0}">
            <span class="info">
                Page <span th:text="${currentPage}">1</span> / <span th:text="${totalPages}">1</span>
                · Total: <span th:text="${rentals.totalElements}">0</span>
            </span>
            <div class="pages">
                <a th:class="${currentPage == 1 ? 'disabled' : ''}"
                   th:href="@{/admin/rentals(status=${status}, from=${from}, to=${to}, page=${currentPage - 1})}">Prev</a>
                <span th:each="i : ${#numbers.sequence(1, totalPages)}"
                      th:class="${currentPage == i ? 'current' : ''}">
                    <a th:if="${currentPage != i}"
                       th:href="@{/admin/rentals(status=${status}, from=${from}, to=${to}, page=${i})}" th:text="${i}"></a>
                    <span th:if="${currentPage == i}" th:text="${i}"></span>
                </span>
                <a th:class="${currentPage == totalPages ? 'disabled' : ''}"
                   th:href="@{/admin/rentals(status=${status}, from=${from}, to=${to}, page=${currentPage + 1})}">Next</a>
            </div>
        </div>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
