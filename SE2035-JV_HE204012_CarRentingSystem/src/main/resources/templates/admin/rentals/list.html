<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rentals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="admin-layout">
    <div th:replace="~{fragments/sidebar :: sidebar(activeMenu='rentals')}"></div>

    <main class="admin-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="mb-0">Rental Management</h1>
        </div>

        <div th:if="${toastMessage}" class="alert alert-dismissible fade show"
             th:classappend="${toastType == 'success' ? 'alert-success' : 'alert-danger'}">
            <span th:text="${toastMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <form method="get" class="row mb-3 g-2">
            <div class="col-md-3">
                <input type="date" name="from" class="form-control" placeholder="From" th:value="${from}">
            </div>
            <div class="col-md-3">
                <input type="date" name="to" class="form-control" placeholder="To" th:value="${to}">
            </div>
            <div class="col-md-3">
                <select name="status" class="form-select">
                    <option value="">All Status</option>
                    <option value="Active" th:selected="${status == 'Active'}">Active</option>
                    <option value="Completed" th:selected="${status == 'Completed'}">Completed</option>
                    <option value="Cancelled" th:selected="${status == 'Cancelled'}">Cancelled</option>
                </select>
            </div>
            <div class="col-md-3">
                <button type="submit" class="btn btn-secondary w-100">Filter</button>
            </div>
        </form>

        <div class="card border">
            <table class="table table-borderless mb-0">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Customer ID</th>
                    <th>Car ID</th>
                    <th>Pickup</th>
                    <th>Return</th>
                    <th>Rent Price</th>
                    <th>Status</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${rentals.totalElements == 0}">
                    <td colspan="8" class="text-center text-muted py-4">No rentals found</td>
                </tr>
                <tr th:each="r : ${rentals}">
                    <td><a th:href="@{/admin/rentals/{id}(id=${r.id})}" th:text="${r.id}"></a></td>
                    <td th:text="${r.customerId}"></td>
                    <td th:text="${r.carId}"></td>
                    <td th:text="${r.pickupDate}"></td>
                    <td th:text="${r.returnDate}"></td>
                    <td th:text="${#numbers.formatDecimal(r.rentPrice, 0, 'COMMA', 2, 'POINT')} + ' đ'"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${r.status == 'Active' ? 'bg-primary' : (r.status == 'Completed' ? 'bg-success' : 'bg-secondary')}"
                              th:text="${r.status}"></span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/admin/rentals/{id}/edit(id=${r.id})}" class="btn btn-sm btn-outline-primary">Edit</a>
                        <form th:action="@{/admin/rentals/{id}/delete(id=${r.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Delete this rental?');">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-3" th:if="${totalPages > 1}">
            <small class="text-muted">
                Page <span th:text="${currentPage}">1</span> of <span th:text="${totalPages}">1</span>
                | Total: <span th:text="${rentals.totalElements}">0</span> rental(s)
            </small>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${currentPage == 1 ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/admin/rentals(status=${status}, from=${from}, to=${to}, page=${currentPage - 1})}">Previous</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                        th:classappend="${currentPage == i ? 'active' : ''}">
                        <a class="page-link" th:href="@{/admin/rentals(status=${status}, from=${from}, to=${to}, page=${i})}" th:text="${i}"></a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage == totalPages ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/admin/rentals(status=${status}, from=${from}, to=${to}, page=${currentPage + 1})}">Next</a>
                    </li>
                </ul>
            </nav>
        </div>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
