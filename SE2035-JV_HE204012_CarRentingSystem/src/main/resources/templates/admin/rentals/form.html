<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Rental</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar(activeMenu='rentals')}"></div>

    <main class="app-content narrow">
        <div class="page-head">
            <h1>Edit Rental</h1>
            <div class="actions">
                <a th:href="@{/admin/rentals}" class="btn btn-ghost btn-sm">Back</a>
            </div>
        </div>

        <form th:action="@{/admin/rentals/{id}(id=${rentalId})}"
              th:object="${rentalRequest}" method="post" class="form-card">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="field-row cols-2">
                <div class="field">
                    <label>Pickup Date</label>
                    <input type="date" th:field="*{pickupDate}" required>
                    <span class="err" th:errors="*{pickupDate}"></span>
                </div>
                <div class="field">
                    <label>Return Date</label>
                    <input type="date" th:field="*{returnDate}" required>
                    <span class="err" th:errors="*{returnDate}"></span>
                </div>
            </div>

            <div class="field-row cols-2">
                <div class="field">
                    <label>Rent Price</label>
                    <input type="number" step="0.01" th:field="*{rentPrice}" required>
                    <span class="err" th:errors="*{rentPrice}"></span>
                </div>
                <div class="field">
                    <label>Status</label>
                    <select th:field="*{status}">
                        <option value="Active">Active</option>
                        <option value="Completed">Completed</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                </div>
            </div>

            <div class="form-actions">
                <a th:href="@{/admin/rentals}" class="btn btn-ghost">Cancel</a>
                <button type="submit" class="btn">Update</button>
            </div>
        </form>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
