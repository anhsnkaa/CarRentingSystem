<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rental Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar(activeMenu='rentals')}"></div>

    <main class="app-content">
        <div class="page-head">
            <h1>Rental #<span th:text="${rental.id}">0</span></h1>
            <div class="actions">
                <a th:href="@{/admin/rentals}" class="btn btn-ghost btn-sm">← Back</a>

                <form th:if="${rental.status == 'Pending' and (car == null or car.status == 'Available')}"
                      th:action="@{/admin/rentals/{id}/approve(id=${rental.id})}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm"
                            onclick="return confirm('Approve this rental request?');">Approve</button>
                </form>
                <form th:if="${rental.status == 'Pending'}"
                      th:action="@{/admin/rentals/{id}/reject(id=${rental.id})}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm btn-danger"
                            onclick="return confirm('Reject this rental request?');">Reject</button>
                </form>

                <form th:if="${rental.status == 'Active'}"
                      th:action="@{/admin/rentals/{id}/complete(id=${rental.id})}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm btn-success"
                            onclick="return confirm('Confirm car returned? Car will be marked Available.');">Mark Returned</button>
                </form>
            </div>
        </div>

        <div th:if="${rental.status == 'Pending' and car != null and car.status == 'Rented'}"
             class="toast toast-err" style="margin-bottom:16px;">
            <strong>Cannot approve this request.</strong>
            The car <span th:text="${car.carName}"></span> has already been booked by another customer.
            You can only <strong>reject</strong> this request.
        </div>

        <div class="detail-card">
            <div class="detail-row">
                <dt>Customer</dt>
                <dd>
                    <span th:text="${customer != null ? customer.fullName : 'Customer #' + rental.customerId}">Customer</span>
                    <span class="sub" style="margin-left:8px;" th:if="${customer != null}">
                        · <span th:text="${customer.mobile}">Mobile</span> ·
                        <span th:text="${customer.identityCard}">Identity</span>
                    </span>
                </dd>
            </div>
            <div class="detail-row">
                <dt>Car</dt>
                <dd>
                    <span th:text="${car != null ? car.carName : 'Car #' + rental.carId}">Car</span>
                    <span class="sub" style="margin-left:8px;" th:if="${car != null and producer != null}">
                        · <span th:text="${producer.producerName}">Producer</span> ·
                        <span th:text="${car.carModelYear}">Year</span> ·
                        <span th:text="${car.color}">Color</span>
                    </span>
                </dd>
            </div>
            <div class="detail-row">
                <dt>Pickup Date</dt>
                <dd th:text="${rental.pickupDate}"></dd>
            </div>
            <div class="detail-row">
                <dt>Return Date</dt>
                <dd th:text="${rental.returnDate}"></dd>
            </div>
            <div class="detail-row">
                <dt>Rent Price</dt>
                <dd th:text="${#numbers.formatDecimal(rental.rentPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></dd>
            </div>
            <div class="detail-row">
                <dt>Status</dt>
                <dd>
                    <span th:class="${rental.status == 'Pending' ? 'pill pill-pending' :
                                     (rental.status == 'Active' ? 'pill pill-active' :
                                     (rental.status == 'Completed' ? 'pill pill-ok' : 'pill pill-cancel'))}"
                          th:text="${rental.status}"></span>
                </dd>
            </div>
        </div>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
