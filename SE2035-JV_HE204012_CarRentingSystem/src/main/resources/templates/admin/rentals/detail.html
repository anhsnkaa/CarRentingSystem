<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rental Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar(activeMenu='rentals')}"></div>

    <main class="app-content">
        <div class="page-head">
            <h1>Rental #<span th:text="${rental.id}">0</span></h1>
            <div class="actions">
                <a th:href="@{/admin/rentals}" class="btn btn-ghost btn-sm">← Back</a>
                <a th:href="@{/admin/rentals/{id}/edit(id=${rental.id})}" class="btn btn-sm">Edit</a>
                <form th:if="${rental.status == 'Active'}"
                      th:action="@{/admin/rentals/{id}/complete(id=${rental.id})}" method="post"
                      onsubmit="return confirm('Mark this rental as completed?');">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-success btn-sm">Mark Completed</button>
                </form>
            </div>
        </div>

        <div class="detail-card">
            <div class="detail-row">
                <dt>Customer ID</dt>
                <dd th:text="${rental.customerId}"></dd>
            </div>
            <div class="detail-row">
                <dt>Car</dt>
                <dd>
                    <span th:text="${car != null ? car.carName : 'Car ' + rental.carId}"></span>
                </dd>
            </div>
            <div class="detail-row">
                <dt>Pickup Date</dt>
                <dd th:text="${rental.pickupDate}"></dd>
            </div>
            <div class="detail-row">
                <dt>Return Date</dt>
                <dd th:text="${rental.returnDate}"></dd>
            </div>
            <div class="detail-row">
                <dt>Rent Price</dt>
                <dd th:text="${#numbers.formatDecimal(rental.rentPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></dd>
            </div>
            <div class="detail-row">
                <dt>Status</dt>
                <dd>
                    <span th:class="${rental.status == 'Active' ? 'pill pill-active' : (rental.status == 'Completed' ? 'pill pill-ok' : 'pill pill-muted')}"
                          th:text="${rental.status}"></span>
                </dd>
            </div>
        </div>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
