<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rental Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="admin-layout">
    <div th:replace="~{fragments/sidebar :: sidebar(activeMenu='rentals')}"></div>

    <main class="admin-content">
        <h1 class="mb-4">Rental #<span th:text="${rental.id}"></span></h1>

        <div class="card border p-4 mb-4">
            <dl class="row mb-0">
                <dt class="col-sm-3">Customer ID</dt>
                <dd class="col-sm-9" th:text="${rental.customerId}"></dd>

                <dt class="col-sm-3">Car</dt>
                <dd class="col-sm-9">
                    <span th:text="${car != null ? car.carName : 'N/A'}"></span>
                    (<span th:text="${rental.carId}"></span>)
                </dd>

                <dt class="col-sm-3">Pickup Date</dt>
                <dd class="col-sm-9" th:text="${rental.pickupDate}"></dd>

                <dt class="col-sm-3">Return Date</dt>
                <dd class="col-sm-9" th:text="${rental.returnDate}"></dd>

                <dt class="col-sm-3">Rent Price</dt>
                <dd class="col-sm-9" th:text="${#numbers.formatDecimal(rental.rentPrice, 0, 'COMMA', 2, 'POINT')} + ' đ'"></dd>

                <dt class="col-sm-3">Status</dt>
                <dd class="col-sm-9" th:text="${rental.status}"></dd>
            </dl>
        </div>

        <a th:href="@{/admin/rentals}" class="btn btn-outline-secondary">Back to list</a>
        <a th:href="@{/admin/rentals/{id}/edit(id=${rental.id})}" class="btn btn-primary">Edit</a>
        <form th:if="${rental.status == 'Active'}"
              th:action="@{/admin/rentals/{id}/complete(id=${rental.id})}" method="post" class="d-inline"
              onsubmit="return confirm('Mark this rental as completed? The car will become Available.');">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-success">✓ Mark Completed</button>
        </form>
        <a th:href="@{/admin/dashboard}" class="btn btn-link">← Back to Dashboard</a>
    </main>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
