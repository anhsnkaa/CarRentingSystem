<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FU Car Renting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <style>
        .review-grid {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(3, 1fr);
        }
        .review-card {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 20px;
            background: var(--paper);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .review-card .review-car {
            font-size: 16px;
            font-weight: 600;
            color: var(--ink);
            margin: 0;
        }
        .review-card .stars {
            color: var(--accent);
            letter-spacing: 2px;
            font-size: 14px;
        }
        .review-card .review-comment {
            font-size: 14px;
            color: var(--ink-2);
            margin: 0;
            line-height: 1.5;
            flex: 1;
        }
        .review-card .review-author {
            font-size: 13px;
            color: var(--muted);
            font-style: italic;
            border-top: 1px solid var(--line-2, #f1f5f9);
            padding-top: 10px;
        }
    </style>
</head>
<body class="home-body">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<section class="hero">
    <div class="container">
        <h1>Car Renting System</h1>
        <div class="hero-cta">
            <a th:href="@{/login}" class="btn">Sign in</a>
            <a th:href="@{/register}" class="btn btn-ghost">Create account</a>
        </div>
        <p class="hero-meta">
            <strong th:text="${carCount}">0</strong> car(s) available now.
        </p>
    </div>
</section>

<section class="section">
    <div class="container">
        <div class="section-head">
            <h2>Available cars</h2>
        </div>

        <div class="fleet" th:if="${!#lists.isEmpty(featuredCars)}">
            <a th:each="c : ${featuredCars}"
               th:href="@{/cars/{id}(id=${c.id})}"
               class="fleet-card"
               th:style="${c.status != 'Available' ? 'opacity:0.55;' : ''}">
                <div style="display:flex; justify-content:space-between; align-items:start; gap:8px;">
                    <div style="min-width:0;">
                        <p class="fleet-producer"
                           th:text="${producerMap[c.producerId] != null ? producerMap[c.producerId].producerName : ''}">
                            Producer</p>
                        <h3 th:text="${c.carName}">Car Name</h3>
                    </div>
                    <span class="status"
                          th:style="${c.status != 'Available' ? 'background:#e2e8f0; color:#475569;' : ''}"
                          th:text="${c.status}">Available</span>
                </div>
                <p class="fleet-spec">
                    <span th:text="${c.carModelYear}">2024</span> ·
                    <span th:text="${c.color}">White</span> ·
                    <span th:text="${c.capacity}">5</span> seats
                </p>
                <p class="fleet-desc" th:text="${#strings.abbreviate(c.description, 100)}">Description...</p>
                <div class="fleet-foot">
                    <span class="fleet-price">
                        <span th:text="${#numbers.formatDecimal(c.rentPrice, 0, 'COMMA', 0, 'POINT')}">0</span> đ
                        <small>/ day</small>
                    </span>
                    <span class="fleet-arrow">View →</span>
                </div>
            </a>
        </div>

        <div class="fleet-empty" th:if="${#lists.isEmpty(featuredCars)}">
            No cars yet.
        </div>

        <div class="fleet-pager" th:if="${totalPages > 1}">
            <div class="fleet-pager-info">
                Showing
                <span th:text="${(currentPage - 1) * pageSize + 1}">1</span>–<span th:text="${currentPage * pageSize < totalCars ? currentPage * pageSize : totalCars}">6</span>
                of <span th:text="${totalCars}">0</span>
            </div>
            <div class="fleet-pager-pages">
                <a th:if="${currentPage > 1}"
                   th:href="@{/(page=${currentPage - 1}, size=${pageSize})}">← Prev</a>
                <span th:unless="${currentPage > 1}" class="disabled">← Prev</span>

                <th:block th:each="i : ${#numbers.sequence(1, totalPages)}">
                    <span th:if="${i == currentPage}" class="current" th:text="${i}">1</span>
                    <a th:unless="${i == currentPage}"
                       th:href="@{/(page=${i}, size=${pageSize})}"
                       th:text="${i}">1</a>
                </th:block>

                <a th:if="${currentPage < totalPages}"
                   th:href="@{/(page=${currentPage + 1}, size=${pageSize})}">Next →</a>
                <span th:unless="${currentPage < totalPages}" class="disabled">Next →</span>
            </div>
        </div>
    </div>
</section>

<section class="section">
    <div class="container">
        <div class="section-head">
            <h2>Reviews</h2>
        </div>

        <div class="review-grid" th:if="${!#lists.isEmpty(latestReviews)}">
            <div class="review-card" th:each="rv : ${latestReviews}">
                <h4 class="review-car"
                    th:text="${reviewCarMap[rv.carRenId] != null ? reviewCarMap[rv.carRenId].carName : 'Car'}">
                    Car Name
                </h4>
                <div class="stars"
                     th:text="${#strings.repeat('★', rv.reviewStar) + #strings.repeat('☆', 5 - rv.reviewStar)}">
                    ★★★★★
                </div>
                <p class="review-comment" th:text="${rv.comment}">Comment...</p>
                <div class="review-author"
                     th:text="${reviewCustomerMap[rv.carRenId] != null ? '— ' + reviewCustomerMap[rv.carRenId].fullName : '— Anonymous'}">
                    — Author
                </div>
            </div>
        </div>

        <div class="reviews-empty" th:if="${#lists.isEmpty(latestReviews)}">
            No reviews yet.
        </div>
    </div>
</section>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
