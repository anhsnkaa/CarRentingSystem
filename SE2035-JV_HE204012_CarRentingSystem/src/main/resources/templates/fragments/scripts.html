<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><body><th:block th:fragment="scripts">    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>    <script>        (function() {            var today = new Date();            var yyyy = today.getFullYear();            var mm = String(today.getMonth() + 1).padStart(2, "0");            var dd = String(today.getDate()).padStart(2, "0");            var todayStr = yyyy + "-" + mm + "-" + dd;            document.querySelectorAll("input[type=date].auto-today").forEach(function(input) {                if (!input.value) input.value = todayStr;            });            document.querySelectorAll("input[type=date].min-today:not([min])").forEach(function(input) {                input.min = todayStr;            });            var btn = document.createElement("button");            btn.type = "button";            btn.className = "floating-back";            btn.setAttribute("aria-label", "Go back");            btn.innerHTML = "<span aria-hidden=\"true\">\u2190</span><span>Back</span>";            btn.addEventListener("click", function() {                if (document.referrer && document.referrer !== window.location.href) {                    history.back();                } else {                    window.location.href = "/";                }            });            document.body.appendChild(btn);        })();    </script></th:block></body></html>
