<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<body>
<nav th:fragment="navbar" class="app-navbar">
    <div class="app-navbar-inner">
        <a class="app-brand" th:href="@{/}">Car Renting</a>

        <div class="app-navbar-right">

            <span sec:authorize="isAuthenticated()"
                  class="app-nav-user"
                  th:text="${account != null ? account.account.accountName : 'Guest'}">Guest</span>

            <form th:action="@{/logout}" method="post" class="app-nav-form"
                  sec:authorize="isAuthenticated()">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="app-nav-logout">Logout</button>
            </form>
        </div>
    </div>
</nav>
</body>
</html>
